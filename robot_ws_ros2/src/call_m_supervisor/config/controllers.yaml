controller_manager:
  ros__parameters:
    update_rate: 100 #Hz
    use_sim_time: true

    # Controllers
    wheels_cont:
      type: velocity_controllers/JointGroupVelocityController

    wheels_sup_cont:
      type: position_controllers/JointGroupPositionController

    cams_cont:
      type: position_controllers/JointGroupPositionController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    io_and_status_controller:
      type: ur_controllers/GPIOController

    speed_scaling_state_broadcaster:
      type: ur_controllers/SpeedScalingStateBroadcaster

    force_torque_sensor_broadcaster:
      type: ur_controllers/ForceTorqueStateBroadcaster

    joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    scaled_joint_trajectory_controller:
      type: ur_controllers/ScaledJointTrajectoryController

    forward_velocity_controller:
      type: velocity_controllers/JointGroupVelocityController

    forward_position_controller:
      type: position_controllers/JointGroupPositionController

# Individual controller configurations
wheels_cont: 
  ros__parameters:
    joints:
      - wheel_1_joint
      - wheel_2_joint
      - wheel_3_joint

wheels_sup_cont: 
  ros__parameters:
    joints:
      - wheel_1_sup_joint
      - wheel_2_sup_joint
      - wheel_3_sup_joint

cams_cont: 
  ros__parameters:
    joints:
      - cam1_joint
      - cam2_joint

speed_scaling_state_broadcaster:
  ros__parameters:
    state_publish_rate: 100.0

force_torque_sensor_broadcaster:
  ros__parameters:
    sensor_name: tcp_fts_sensor
    state_interface_names:
      - force.x
      - force.y
      - force.z
      - torque.x
      - torque.y
      - torque.z
    frame_id: tool0
    topic_name: ft_data

joint_trajectory_controller:
  ros__parameters:
    joints:
      - /ur5e/shoulder_pan_joint
      - /ur5e/shoulder_lift_joint
      - /ur5e/elbow_joint
      - /ur5e/wrist_1_joint
      - /ur5e/wrist_2_joint
      - /ur5e/wrist_3_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 100.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    constraints:
      stopped_velocity_tolerance: 0.2
      goal_time: 0.0
      /ur5e/shoulder_pan_joint: { trajectory: 0.2, goal: 0.1 }
      /ur5e/shoulder_lift_joint: { trajectory: 0.2, goal: 0.1 }
      /ur5e/elbow_joint: { trajectory: 0.2, goal: 0.1 }
      /ur5e/wrist_1_joint: { trajectory: 0.2, goal: 0.1 }
      /ur5e/wrist_2_joint: { trajectory: 0.2, goal: 0.1 }
      /ur5e/wrist_3_joint: { trajectory: 0.2, goal: 0.1 }

scaled_joint_trajectory_controller:
  ros__parameters:
    joints:
      - /ur5e/shoulder_pan_joint
      - /ur5e/shoulder_lift_joint
      - /ur5e/elbow_joint
      - /ur5e/wrist_1_joint
      - /ur5e/wrist_2_joint
      - /ur5e/wrist_3_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 100.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    constraints:
      stopped_velocity_tolerance: 0.2
      goal_time: 0.0
      /ur5e/shoulder_pan_joint: { trajectory: 0.2, goal: 0.1 }
      /ur5e/shoulder_lift_joint: { trajectory: 0.2, goal: 0.1 }
      /ur5e/elbow_joint: { trajectory: 0.2, goal: 0.1 }
      /ur5e/wrist_1_joint: { trajectory: 0.2, goal: 0.1 }
      /ur5e/wrist_2_joint: { trajectory: 0.2, goal: 0.1 }
      /ur5e/wrist_3_joint: { trajectory: 0.2, goal: 0.1 }

forward_velocity_controller:
  ros__parameters:
    joints:
      - /ur5e/shoulder_pan_joint
      - /ur5e/shoulder_lift_joint
      - /ur5e/elbow_joint
      - /ur5e/wrist_1_joint
      - /ur5e/wrist_2_joint
      - /ur5e/wrist_3_joint
    interface_name: velocity

forward_position_controller:
  ros__parameters:
    joints:
      - /ur5e/shoulder_pan_joint
      - /ur5e/shoulder_lift_joint
      - /ur5e/elbow_joint
      - /ur5e/wrist_1_joint
      - /ur5e/wrist_2_joint
      - /ur5e/wrist_3_joint
